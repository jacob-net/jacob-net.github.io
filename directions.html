<!DOCTYPE html>
<html>
<head>


</head>
<body>
    <script>
        function getDirection() {
            const directions=['Straight Forward','Left','Right','Offroad'];
            var output=document.getElementById("output");
            const i=Math.floor(Math.random()*4);
            output.innerHTML=directions[i];
        }
    </script>
<h1>Direction page</h1>
<p>Click button to go either:
    <ul>
        <li>Straight Forward</li>
        <li>Left</li>
        <li>Right</li>
        <li>Offroad</li>
    </ul>
</p>
<button onclick="getDirection()">Press For Directions</button>
<p id="output"></p>
</body>






</html>
